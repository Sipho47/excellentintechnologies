<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Loan System</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #17202a;
            --muted: #687385;
            --line: #dfe5ec;
            --brand: #176c5f;
            --brand-dark: #0f4f46;
            --paper: #ffffff;
            --wash: #f4f7f9;
            --danger: #b42318;
            --success: #147a4f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(135deg, #edf5f1, #f7f8fb 48%, #eef2f6);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            width: min(420px, 100%);
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(26, 43, 58, 0.12);
            padding: 32px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
        }

        input {
            width: 100%;
            height: 46px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 12px;
            color: var(--ink);
            font: inherit;
            background: #fff;
        }

        input:focus {
            border-color: var(--brand);
            outline: 3px solid rgba(23, 108, 95, 0.15);
        }

        .field { margin-bottom: 18px; }

        button {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 6px;
            color: #fff;
            background: var(--brand);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover { background: var(--brand-dark); }

        .flash {
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid var(--line);
            padding: 12px;
            font-size: 14px;
            background: var(--wash);
        }

        .flash.danger {
            color: var(--danger);
            background: #fff4f2;
            border-color: #ffd4cc;
        }

        .flash.success {
            color: var(--success);
            background: #effaf4;
            border-color: #c7ebd6;
        }
    </style>
</head>
<body>
    <main>
        <h1>Loan System</h1>
        <p>Sign in to manage clients, capital, and projected repayments.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Sign in</button>
        </form>
    </main>
</body>
</html>
